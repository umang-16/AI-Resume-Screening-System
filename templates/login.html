{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center mt-3" style="min-height: 75vh;">
    <div class="col-md-5">
        <a href="{{ url_for('index') }}" class="btn btn-primary btn-sm rounded-pill mb-3 shadow-sm fw-bold hover-scale px-4"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
        <div class="card p-5 shadow-lg border-0 rounded-4 glass-card position-relative overflow-hidden mb-5">
            <div class="position-absolute top-0 end-0 bg-primary opacity-10" style="width: 300px; height: 300px; border-radius: 50%; transform: translate(30%, -30%); filter: blur(40px);"></div>
            <div class="text-center mb-5 position-relative z-1">
                <div class="bg-primary bg-opacity-10 text-primary d-inline-flex p-3 rounded-circle mb-3 shadow-sm hover-scale">
                    <i class="bi bi-robot fs-1"></i>
                </div>
                <h3 class="fw-bold text-dark display-6 fs-2">Welcome Back</h3>
                <p class="text-muted">Enter your credentials to access your account.</p>
            </div>
            <form method="POST" class="position-relative z-1">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control shadow-sm" id="email" name="email" placeholder="name@example.com" required>
                    <label for="email"><i class="bi bi-envelope me-2 text-muted"></i>Email address</label>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control shadow-sm" id="password" name="password" placeholder="Password" required>
                    <label for="password"><i class="bi bi-lock me-2 text-muted"></i>Password</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill shadow-lg fw-bold hover-scale py-3">Login Securely</button>
            </form>
            <div class="text-center mt-4 position-relative z-1 pt-3 border-top">
                <p class="text-muted small mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Create one right now</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
